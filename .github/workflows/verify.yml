name: verify

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - "LICENSE"
      - "SECURITY.md"
      - "CONTRIBUTING.md"

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bun run verify
