name: diag-token

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      LOOP_INVITE_PASSWORD: ${{ secrets.LOOP_INVITE_PASSWORD }}
    steps:
      - name: probe
        run: |
          python3 <<'PY'
          import os, hashlib
          val = os.environ.get("LOOP_INVITE_PASSWORD", "")
          print(f"len={len(val)}")
          print(f"sha8={hashlib.sha256(val.encode()).hexdigest()[:8]}")
          print(f"pool_sha8={hashlib.sha256(b'pool').hexdigest()[:8]}")
          PY
