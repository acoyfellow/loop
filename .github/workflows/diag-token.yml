name: diag-token

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: probe
        run: |
          set -e
          curl -sS "https://api.cloudflare.com/client/v4/accounts?per_page=5" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -o /tmp/accounts.json
          python3 <<'PY'
          import os, json, hashlib
          accounts = json.load(open("/tmp/accounts.json")).get("result") or []
          secret = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          print(f"secret_id_len={len(secret)}")
          print(f"secret_id_sha8={hashlib.sha256(secret.encode()).hexdigest()[:8]}")
          print(f"token_account_count={len(accounts)}")
          for a in accounts:
              aid = a["id"]
              print(
                  f"token_id_sha8={hashlib.sha256(aid.encode()).hexdigest()[:8]}"
                  f" name={a.get('name')!r}"
                  f" matches_secret={(aid == secret)}"
                  f" same_len={(len(aid) == len(secret))}"
              )
          PY
