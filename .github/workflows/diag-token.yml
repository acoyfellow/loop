name: diag-token

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: probe
        run: |
          set -e
          run() {
            local label="$1" url="$2"
            local body
            body=$(curl -sS "$url" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -w '\nHTTP_STATUS=%{http_code}')
            echo "=== $label"
            echo "$body" | sed -E 's/[A-Za-z0-9_-]{32,}/REDACTED/g' | head -12
            echo
          }
          run "user/tokens/verify" "https://api.cloudflare.com/client/v4/user/tokens/verify"
          run "accounts (list, max 5)" "https://api.cloudflare.com/client/v4/accounts?per_page=5"
          run "accounts/$CLOUDFLARE_ACCOUNT_ID" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID"
          run "accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts (1)" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts?per_page=1"
          run "accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
          run "zones list (coey.dev)" "https://api.cloudflare.com/client/v4/zones?name=coey.dev"
