name: diag-token

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: verify token
        run: |
          set -e
          probe() {
            local label="$1" url="$2"
            local body
            body=$(curl -sS "$url" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -w '\nHTTP_STATUS=%{http_code}')
            echo "=== $label"
            echo "$body" | sed -E 's/[A-Za-z0-9_\-\.]{20,}/REDACTED/g' | head -8
            echo
          }
          probe "user/tokens/verify" "https://api.cloudflare.com/client/v4/user/tokens/verify"
          probe "accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
          probe "accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-service/settings" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-service/settings"
          probe "accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-service/subdomain" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/alchemy-state-service/subdomain"
          probe "accounts/$CLOUDFLARE_ACCOUNT_ID (account read)" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID"
